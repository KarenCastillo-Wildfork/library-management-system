server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: library-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/library_db}
    username: ${DB_USERNAME:library_user}
    password: ${DB_PASSWORD:library_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:change-this-super-secret-key-in-prod-please-0123456789}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
  internal:
    api-key: ${INTERNAL_API_KEY:change-this-internal-key}
  service-b:
    base-url: ${SERVICE_B_URL:http://localhost:8081}
    timeout-ms: ${SERVICE_B_TIMEOUT_MS:5000}

logging:
  level:
    com.library: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] traceId=%X{traceId:-} %logger{36} - %msg%n"
