name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  service-a:
    name: Service A (Java / Spring Boot)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-a-library
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Run tests
        run: mvn -B test

  service-b:
    name: Service B (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: service-b-loans
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: service-b-loans/go.sum
      - name: Vet
        run: go vet ./...
      - name: Run tests
        run: go test ./... -v
